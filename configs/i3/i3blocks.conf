# List of valid properties:
#
# align
# color
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
#
# The top properties below are applied to every block, but can be overridden.
command=~/.config/i3/scripts/$BLOCK_NAME
separator=false
markup=pango

[time]
command=date '+%a %d %b %H:%M:%S'
interval=1

[simple-2]
full_text=:
color=#717171

