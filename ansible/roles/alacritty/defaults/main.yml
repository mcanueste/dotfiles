---
user_home: "/home/mcst"
dotfiles_url: https://github.com/mcanueste/dotfiles.git
dotfiles_dir: "{{ user_home }}/.dotfiles"
cargo_dir: "{{ user_home }}/.cargo"
config_dir: "{{ user_home }}/.config"
alacritty_path: "{{ user_home }}/.cargo/bin/alacritty"
alacritty_dir: "{{ user_home }}/.config/alacritty"

alacritty_dependencies:
  - ca-certificates
  - build-essential
  - fontconfig
  - curl
  - cmake 
  - pkg-config
  - libfreetype6-dev
  - libfontconfig1-dev
  - libxcb-xfixes0-dev
  - libxkbcommon-dev
  - python3
