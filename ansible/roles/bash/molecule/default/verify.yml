---
- name: Verify bash role
  hosts: all
  tasks:
    - name: Stat ~/.bashrc
      ansible.builtin.stat:
        path: ~/.bashrc
      register: links

    - name: Check if ~/.bashrc link exists
      ansible.builtin.assert:
        that:
          - links.stat.islnk is defined
          - links.stat.islnk
        success_msg: "~/.bashrc link exists"
        fail_msg: "~/.bashrc link does not exist"
