---
aptrepo_dependencies:
  - ca-certificates
  - curl

aptrepo_packages:
  brave-browser: 
    gpg:
      url: "https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg"
      dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    repository: "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"

  kubectl: 
    gpg:
      url: "https://packages.cloud.google.com/apt/doc/apt-key.gpg"
      dest: /etc/apt/keyrings/kubernetes-archive-keyring.gpg
    repository: "deb [signed-by=/etc/apt/keyrings/kubernetes-archive-keyring.gpg] https://apt.kubernetes.io/ kubernetes-xenial main"
